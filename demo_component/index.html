<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Web Component Test</title>
    <style>
        :root {
            --bg: #111214;
            --surface: #1b1c1f;
            --border: #35363c;
            --text: #ededed;
            --text-muted: #9a9aa0;
            --orange: #ff5a1f;
            --red: #e8432b;
            --font: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }

        /* Self-hosted so the page never depends on an external font server; same font
           used by the egui-rendered components (see egui_web_component::install_fonts). */
        @font-face {
            font-family: 'JetBrains Mono';
            src: url('./fonts/JetBrainsMono-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'JetBrains Mono';
            src: url('./fonts/JetBrainsMono-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: var(--font);
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
        }

        header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom: 2px solid var(--orange);
            color: var(--text);
            padding: 30px;
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0 0 10px 0;
        }

        header p {
            margin: 0;
            color: var(--text-muted);
        }

        .content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .intro-text {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 25px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .intro-text p {
            margin: 10px 0;
            color: var(--text-muted);
        }

        .container {
            display: flex;
            gap: 20px;
            align-items: stretch;
        }

        .sidebar {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 25px;
            min-height: 300px;
        }

        .main-content {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .footer {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 20px;
            margin-top: 30px;
        }

        .footer p {
            margin: 5px 0;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="intro-text">
            <p>
                This is a paragraph of text preceding the wasm component.
            </p>
        </div>


        <div class="main-content">
            <my-counter></my-counter>
        </div>


        <div class="main-content">
            <my-counter></my-counter>
        </div>

        <div style="height: 10px;"></div>
        
        <div class="main-content">
            <egui-component style="height: 60px;"></egui-component>
        </div>

        <div style="height: 100px;"></div>

        <div class="main-content">
            <egui-component style="height: 70vh;"></egui-component>
        </div>

        <div class="footer">
            <p>This is a little bit of text after the wasm component.</p>
        </div>
    </div>

    <script type="module">
        import init from './pkg/demo_web_component.js';
        await init();
    </script>
</body>
</html>
